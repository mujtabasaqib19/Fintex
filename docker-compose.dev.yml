# Development overrides — run with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./.env:/app/.env
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434

  nginx:
    ports:
      - "80:80"
      - "5173:5173"
